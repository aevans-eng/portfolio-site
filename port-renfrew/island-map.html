<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vancouver Island logging overview</title>
<meta name="description" content="Every block proposed for logging across the areas this project covers on Vancouver Island, on one map.">
<link rel="canonical" href="https://aaronevans.ca/port-renfrew/island-map.html">
<meta property="og:title" content="Vancouver Island logging overview">
<meta property="og:description" content="Every proposed-logging block across the covered areas, on one map.">
<meta property="og:image" content="https://aaronevans.ca/port-renfrew/images/og-card.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box} html,body,#map{height:100%;margin:0}
  body{font-family:"IBM Plex Mono",ui-monospace,monospace;background:#0b0f0d}
  #map{background:#0b0f0d}
  .ov-card{position:absolute;z-index:1000;top:14px;left:14px;max-width:min(360px,calc(100vw - 28px));
    background:rgba(11,15,13,.92);color:#e9e3d5;border:1px solid rgba(233,227,213,.16);border-radius:14px;
    box-shadow:0 16px 40px rgba(0,0,0,.55);padding:16px 18px;backdrop-filter:blur(6px)}
  .ov-card h1{font-family:"Fraunces",Georgia,serif;font-weight:900;font-size:21px;letter-spacing:-.01em;margin:0 0 7px;color:#f3ecdd}
  .ov-card p{font-size:12.5px;color:#b9c0b4;margin:0 0 10px;line-height:1.55}
  .ov-card p b{color:#f3ecdd}
  .ov-card a{color:#f0a874;text-decoration:none}
  .ov-legend{font-size:11px;color:#b9c0b4;display:flex;gap:13px;flex-wrap:wrap;align-items:center}
  .ov-legend span{display:inline-flex;align-items:center;gap:6px}
  .ov-sw{width:13px;height:13px;border-radius:50%;display:inline-block;border:1.5px solid}
  .ov-hint{font-size:10.5px;color:#7f8a7d;margin-top:9px}
  .area-bubble{border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid;
    box-shadow:0 6px 18px rgba(0,0,0,.5);transition:transform .15s ease;cursor:pointer}
  .area-bubble:hover{transform:scale(1.09)}
  .area-bubble.open{background:rgba(245,158,11,.30);border-color:#fbbf24}
  .area-bubble.closed{background:rgba(220,38,38,.24);border-color:#f87171}
  .ab-n{font-family:"Fraunces",Georgia,serif;font-weight:600;color:#fff;line-height:1;text-shadow:0 1px 3px rgba(0,0,0,.6)}
  .leaflet-tooltip.area-tip{background:#15110b;border:1px solid rgba(240,168,116,.4);color:#f3ecdd;
    font-family:"IBM Plex Mono",monospace;font-size:12px;border-radius:6px;padding:4px 9px;box-shadow:0 4px 12px rgba(0,0,0,.5)}
  .leaflet-tooltip.area-tip::before{border-top-color:rgba(240,168,116,.4)}
  .leaflet-popup-content-wrapper{background:#15110b;color:#f3ecdd;border-radius:10px}
  .leaflet-popup-tip{background:#15110b}
  .leaflet-popup-content{font-family:"IBM Plex Mono",monospace;font-size:12.5px;line-height:1.55}
  .leaflet-popup-content b{font-family:"Fraunces",Georgia,serif;font-size:15px;color:#f3ecdd}
  .leaflet-popup-content a{color:#f0a874;font-weight:500}
  .leaflet-popup-close-button{color:#b9c0b4 !important}
  .leaflet-control-attribution{background:rgba(11,15,13,.7) !important;color:#7f8a7d !important}
  .leaflet-control-attribution a{color:#9aa79a !important}
  .leaflet-bar a{background:#15110b;color:#e9e3d5;border-color:rgba(233,227,213,.16)}
  .leaflet-bar a:hover{background:#241a10}
</style></head><body>
<div id="map"></div>
<div class="ov-card">
  <h1>Logging across Vancouver Island</h1>
  <p><b>764</b> blocks proposed or approved for logging across the seven areas this project covers. Tap an area to open its full map.</p>
  <div class="ov-legend"><span><i class="ov-sw" style="background:rgba(245,158,11,.30);border-color:#fbbf24"></i> open for comment</span>
  <span><i class="ov-sw" style="background:rgba(220,38,38,.24);border-color:#f87171"></i> approved or closed</span></div>
  <div class="ov-hint">Circle size = blocks proposed in that area.</div>
</div>
<script>
var AREAS=[{"name":"Port Renfrew","map":"map.html","lat":48.64,"lng":-124.28,"zoom":10,"proposed":88,"open":0,"data":"map-data/proposed-logging.json"},{"name":"Lake Cowichan","map":"lake-cowichan-map.html","lat":48.83,"lng":-124.07,"zoom":11,"proposed":37,"open":0,"data":"map-data-lake-cowichan/proposed-logging.json"},{"name":"Nitinat","map":"nitinat-map.html","lat":48.73,"lng":-124.78,"zoom":11,"proposed":127,"open":1,"data":"map-data-nitinat/proposed-logging.json"},{"name":"Alberni Valley","map":"alberni-map.html","lat":49.22,"lng":-124.95,"zoom":11,"proposed":150,"open":5,"data":"map-data-alberni/proposed-logging.json"},{"name":"Sooke","map":"sooke-map.html","lat":48.45,"lng":-123.86,"zoom":11,"proposed":17,"open":0,"data":"map-data-sooke/proposed-logging.json"},{"name":"Campbell River","map":"campbell-river-map.html","lat":50.12,"lng":-125.52,"zoom":10,"proposed":274,"open":0,"data":"map-data-campbell-river/proposed-logging.json"},{"name":"Gold River","map":"gold-river-map.html","lat":49.78,"lng":-126.1,"zoom":11,"proposed":71,"open":0,"data":"map-data-gold-river/proposed-logging.json"}];
var map=L.map('map').setView([49.7,-125.6],7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {maxZoom:19,subdomains:'abcd',attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map);
function blockStyle(f){var s=(f.properties&&f.properties.fom_status)||'';
  if(/^Open for comment/.test(s)) return {color:'#fbbf24',weight:1,fillColor:'#f59e0b',fillOpacity:0.75};
  return {color:'#f87171',weight:0.8,fillColor:'#dc2626',fillOpacity:0.5};}
function areaIcon(a){
  var n=a.proposed||0;
  var d=Math.round(Math.max(36,Math.min(82,24+Math.sqrt(n)*4.2)));
  var cls=(a.open>0)?'open':'closed';
  var fs=Math.max(13,Math.min(22,Math.round(d*0.32)));
  return L.divIcon({className:'',iconSize:[d,d],iconAnchor:[d/2,d/2],
    html:'<div class="area-bubble '+cls+'" style="width:'+d+'px;height:'+d+'px">'+
         '<span class="ab-n" style="font-size:'+fs+'px">'+n+'</span></div>'});
}
var pts=[];
AREAS.forEach(function(a){
  if(a.lat==null) return;
  pts.push([a.lat,a.lng]);
  var openTxt=(a.open>0)?(a.open+' open for comment now'):'none open for comment now';
  var m=L.marker([a.lat,a.lng],{icon:areaIcon(a),riseOnHover:true,zIndexOffset:1000}).addTo(map);
  m.bindTooltip(a.name+' &middot; '+a.proposed+' blocks',{className:'area-tip',direction:'top',offset:[0,-8]});
  m.bindPopup('<b>'+a.name+'</b><br>'+a.proposed+' blocks proposed &middot; '+openTxt+
    '<br><a href="'+a.map+'">Open '+a.name+' map &rarr;</a>');
  fetch(a.data).then(function(r){return r.ok?r.json():null;}).then(function(fc){
    if(!fc) return;
    L.geoJSON(fc,{style:blockStyle,onEachFeature:function(f,l){
      var p=f.properties||{};l.bindPopup('<b>'+(p.block_name||'Block')+'</b><br>'+(p.fom_status||'')+'<br><a href="'+a.map+'">Open '+a.name+' map &rarr;</a>');
    }}).addTo(map);
  }).catch(function(){});
});
function frame(){map.invalidateSize();if(pts.length>1){map.fitBounds(pts,{padding:[70,70]});}}
frame();
window.addEventListener('load',frame);
</script>
</body></html>
